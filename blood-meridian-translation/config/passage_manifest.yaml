  # PILOT SET — suggested translation order
  # ============================================================
  # 1. 001_see_the_child         (iconic, short, biblical)
  # 2. 002_night_of_your_birth   (cosmological fragment)
  # 3. 003_the_mother_dead       (periodic sentence, high register)
  # 4. 007_divested_of_all       (peak biblical/philosophical)
  # 5. 004_at_fourteen           (landscape, sentence fragments)
  # 6. 010_reverend_dialogue     (the judge's voice, dual register)
  # 7. 005_saint_louis           (river journey, action)
  # 8. 013_toadvine_fight        (violence vocabulary stress-test)
